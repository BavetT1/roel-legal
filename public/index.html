<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROEL — Vintage Camera App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: #0D0D0F;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #F5C80F;
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 16px;
            color: #666;
            margin-bottom: 60px;
            letter-spacing: 0.04em;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
        }
        .links a {
            display: block;
            padding: 14px 20px;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #b0b0b0;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
            transition: border-color 0.2s, color 0.2s;
        }
        .links a:hover {
            border-color: #F5C80F;
            color: #F5C80F;
        }
        .footer {
            margin-top: 60px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
